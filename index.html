<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR読み取り</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f1f3f4;
      font-family: sans-serif;
    }

    .container {
      width: 92%;
      max-width: 520px;
      margin: 24px auto;
      background: white;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.12);
      box-sizing: border-box;
    }

    h1 {
      text-align: center;
      font-size: 42px;
      margin: 0 0 24px 0;
    }

    #reader {
      width: 100%;
      min-height: 520px;
      overflow: hidden;
      border-radius: 20px;
    }

    .info {
      margin-top: 20px;
      font-size: 24px;
      text-align: center;
      color: #666;
    }

    .backBtn {
      width: 100%;
      margin-top: 24px;
      border: none;
      border-radius: 18px;
      background: #6c7075;
      color: white;
      font-size: 34px;
      font-weight: bold;
      padding: 24px;
    }

    .loadingBg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 999999;
      align-items: center;
      justify-content: center;
    }

    .loadingBox {
      background: white;
      border-radius: 24px;
      padding: 42px;
      width: 80%;
      max-width: 420px;
      text-align: center;
      font-size: 34px;
      font-weight: bold;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>QR読み取り</h1>

    <div id="reader"></div>

    <div class="info">
      QRコードを読み取ってください
    </div>

    <button class="backBtn" onclick="goBack()">
      トップへ戻る
    </button>
  </div>

  <div id="loadingBg" class="loadingBg">
    <div class="loadingBox">
      呼び出し中...
    </div>
  </div>

  <script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbyiuwTyeMe3Mn4R0BXvdHZMtEODiKeYqxHOAeitTGSmxud2jLGdT7sRNSGfse_G8xqewg/exec";

    let html5QrCode = null;
    let alreadyScanned = false;

    const pageParams = new URLSearchParams(window.location.search);
    const DEFAULT_PERSON = pageParams.get("person") || "";
    const DEFAULT_SITE = pageParams.get("site") || "";

    function showLoading() {
      const bg = document.getElementById("loadingBg");

      if (bg) {
        bg.style.display = "flex";
        bg.style.opacity = "1";
      }
    }

    function goBack() {
      window.history.back();
    }

    function extractToolId(decodedText) {
      let toolId = decodedText;

      try {
        if (decodedText.indexOf("id=") !== -1) {
          const url = new URL(decodedText);
          toolId = url.searchParams.get("id") || decodedText;
        }
      } catch (e) {
        console.log(e);
      }

      return toolId;
    }

    function moveToToolPage(toolId) {
      const moveUrl =
        APP_URL +
        "?id=" + encodeURIComponent(toolId) +
        "&person=" + encodeURIComponent(DEFAULT_PERSON) +
        "&site=" + encodeURIComponent(DEFAULT_SITE) +
        "&t=" + new Date().getTime();

      setTimeout(function() {
        window.location.href = moveUrl;
      }, 600);
    }

    function onScanSuccess(decodedText) {
      if (!decodedText || alreadyScanned) {
        return;
      }

      alreadyScanned = true;

      const toolId = extractToolId(decodedText);

      showLoading();

      requestAnimationFrame(function() {
        requestAnimationFrame(function() {
          if (html5QrCode) {
            html5QrCode.stop()
              .then(function() {
                moveToToolPage(toolId);
              })
              .catch(function(err) {
                console.log(err);
                moveToToolPage(toolId);
              });
          } else {
            moveToToolPage(toolId);
          }
        });
      });
    }

    function startCamera() {
      html5QrCode = new Html5Qrcode("reader");

      const config = {
        fps: 15,

        qrbox: function(viewfinderWidth, viewfinderHeight) {
          const size =
            Math.min(viewfinderWidth, viewfinderHeight) * 0.8;

          return {
            width: size,
            height: size
          };
        },

        aspectRatio: 1.0,

        videoConstraints: {
          facingMode: {
            ideal: "environment"
          },
          width: {
            ideal: 1920
          },
          height: {
            ideal: 1080
          },
          focusMode: "continuous"
        }
      };

      html5QrCode.start(
        {
          facingMode: {
            exact: "environment"
          }
        },
        config,
        onScanSuccess
      )
      .catch(function(err1) {
        console.log(err1);

        html5QrCode.start(
          {
            facingMode: "environment"
          },
          config,
          onScanSuccess
        )
        .catch(function(err2) {
          console.log(err2);
          alert("カメラ起動に失敗しました。");
        });
      });
    }

    window.addEventListener("load", startCamera);
  </script>

</body>
</html>
