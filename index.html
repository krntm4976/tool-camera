<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>工具QRカメラ</title>

  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>

  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 18px;
      background: #f1f3f4;
      font-size: 22px;
    }

    .card {
      background: #ffffff;
      border-radius: 22px;
      padding: 24px;
      max-width: 720px;
      margin: 0 auto;
      box-shadow: 0 4px 14px rgba(0,0,0,0.16);
    }

    h1 {
      font-size: 40px;
      text-align: center;
      margin: 0 0 22px 0;
      font-weight: bold;
    }

    #readerBox {
      display: block;
      background: #000;
      border-radius: 18px;
      overflow: hidden;
      min-height: 280px;
    }

    #qrVideo {
      width: 100%;
      display: block;
    }

    #qrCanvas {
      display: none;
    }

    .backBtn {
      width: 100%;
      padding: 24px;
      font-size: 30px;
      font-weight: bold;
      border: none;
      border-radius: 18px;
      background: #5f6368;
      color: white;
      margin-top: 24px;
    }

    .msg {
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      margin-top: 16px;
      white-space: pre-wrap;
      word-break: break-word;
      color: #d93025;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>工具QRカメラ</h1>

    <div id="readerBox">
      <video id="qrVideo" playsinline autoplay muted></video>
    </div>

    <button class="backBtn" onclick="goHome()">
      戻る
    </button>

    <div id="msg" class="msg"></div>
  </div>

  <canvas id="qrCanvas"></canvas>

  <script>
    let appUrl = "";
    let site = "";
    let person = "";

    let stream = null;
    let scanning = false;
    let locked = false;

    window.addEventListener("load", function() {
      const params = new URLSearchParams(location.search);

      appUrl = params.get("app") || "";
      site = params.get("site") || "";
      person = params.get("person") || "";

      if (!appUrl) {
        document.getElementById("msg").innerText =
          "Apps ScriptのURLが渡されていません。\n工具管理トップページから開き直してください。";
        return;
      }

      startCamera();
    });

    async function startCamera() {
      const msg = document.getElementById("msg");
      const video = document.getElementById("qrVideo");

      msg.innerText = "";

      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "environment" }
          },
          audio: false
        });

        video.srcObject = stream;
        video.setAttribute("playsinline", true);

        await video.play();

        scanning = true;
        locked = false;

        requestAnimationFrame(scanFrame);

      } catch (error) {
        msg.innerText =
          "カメラを起動できませんでした。\nChromeで開き、カメラ権限を許可してください。";
      }
    }

    function scanFrame() {
      if (!scanning || locked) return;

      const video = document.getElementById("qrVideo");
      const canvas = document.getElementById("qrCanvas");
      const ctx = canvas.getContext("2d");

      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

        const code = jsQR(
          imageData.data,
          imageData.width,
          imageData.height
        );

        if (code && code.data) {
          locked = true;

          const itemId = extractItemId(code.data);

          if (!itemId) {
            alert("管理番号を読み取れませんでした。");
            locked = false;
            requestAnimationFrame(scanFrame);
            return;
          }

          stopCamera();
          goToolPage(itemId);
          return;
        }
      }

      requestAnimationFrame(scanFrame);
    }

    function stopCamera() {
      scanning = false;

      if (stream) {
        stream.getTracks().forEach(function(track) {
          track.stop();
        });
        stream = null;
      }
    }

    function extractItemId(text) {
      if (!text) return "";

      try {
        const url = new URL(text);
        const id = url.searchParams.get("id");
        if (id) return id;
      } catch (e) {
        // URLでない場合はそのまま管理番号扱い
      }

      return String(text).trim();
    }

    function goToolPage(itemId) {
      const url =
        appUrl +
        "?id=" + encodeURIComponent(itemId) +
        "&site=" + encodeURIComponent(site) +
        "&person=" + encodeURIComponent(person);

      location.href = url;
    }

    function goHome() {
      stopCamera();

      if (!appUrl) {
        history.back();
        return;
      }

      const url =
        appUrl +
        "?mode=home" +
        "&person=" + encodeURIComponent(person) +
        "&site=" + encodeURIComponent(site) +
        "&t=" + new Date().getTime();

      location.href = url;
    }
  </script>
</body>
</html>
