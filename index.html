# index.html（GitHub Pages 側 全体コード）

```html
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR読み取り</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f1f3f4;
      font-family: sans-serif;
    }

    .container {
      width: 92%;
      max-width: 520px;
      margin: 24px auto;
      background: white;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.12);
      box-sizing: border-box;
    }

    h1 {
      text-align: center;
      font-size: 42px;
      margin: 0 0 24px 0;
    }

    #reader {
      width: 100%;
      overflow: hidden;
      border-radius: 20px;
    }

    .info {
      margin-top: 20px;
      font-size: 24px;
      text-align: center;
      color: #666;
    }

    .backBtn {
      width: 100%;
      margin-top: 24px;
      border: none;
      border-radius: 18px;
      background: #6c7075;
      color: white;
      font-size: 34px;
      font-weight: bold;
      padding: 24px;
    }

    /* ローディング */
    .loadingBg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 99999;
      align-items: center;
      justify-content: center;
    }

    .loadingBox {
      background: white;
      border-radius: 24px;
      padding: 42px;
      width: 80%;
      max-width: 420px;
      text-align: center;
      font-size: 34px;
      font-weight: bold;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }
  </style>
</head>
<body>

  <div class="container">

    <h1>QR読み取り</h1>

    <div id="reader"></div>

    <div class="info">
      QRコードを読み取ってください
    </div>

    <button class="backBtn" onclick="goBack()">
      トップへ戻る
    </button>

  </div>

  <!-- ローディング -->
  <div id="loadingBg" class="loadingBg">
    <div class="loadingBox">
      呼び出し中...
    </div>
  </div>

  <script>

    /*************************************************
     * Apps Script URL
     *************************************************/
    const APP_URL = "https://script.google.com/macros/s/AKfycbyiuwTyeMe3Mn4R0BXvdHZMtEODiKeYqxHOAeitTGSmxud2jLGdT7sRNSGfse_G8xqewg/exec";


    /*************************************************
     * ローディング表示
     *************************************************/
    function showLoading() {
      const bg = document.getElementById("loadingBg");

      if (bg) {
        bg.style.display = "flex";
      }
    }


    /*************************************************
     * トップへ戻る
     *************************************************/
    function goBack() {
      window.history.back();
    }


    /*************************************************
     * QR読み取り成功
     *************************************************/
    function onScanSuccess(decodedText) { if (!decodedText) { return; } // URL形式QRなら id= を抜き出す let toolId = decodedText; try { if ( decodedText.indexOf("id=") !== -1 ) { const url = new URL(decodedText); toolId = url.searchParams.get("id"); } } catch(e) { console.log(e); } // 二重読取防止 html5QrCode.stop().then(function() { showLoading(); const moveUrl = APP_URL + "?id=" + encodeURIComponent(toolId) + "&t=" + new Date().getTime(); setTimeout(function() { window.location.href = moveUrl; }, 150); }).catch(function(err) { console.log(err); }); }
    }


    /*************************************************
     * QR読み取り開始
     *************************************************/
    const html5QrCode = new Html5Qrcode("reader");

    Html5Qrcode.getCameras()
      .then(function(devices) {

        if (!devices || devices.length === 0) {
          alert("カメラが見つかりません。");
          return;
        }

        let cameraId = devices[0].id;

        // 背面カメラ優先
        devices.forEach(function(device) {
          const label = (device.label || "").toLowerCase();

          if (
            label.includes("back") ||
            label.includes("rear") ||
            label.includes("背面")
          ) {
            cameraId = device.id;
          }
        });

        html5QrCode.start(
          cameraId,
          {
            fps: 10,
            qrbox: {
              width: 280,
              height: 280
            }
          },
          onScanSuccess
        );

      })
      .catch(function(err) {
        console.log(err);
        alert("カメラ起動に失敗しました。");
      });

  </script>

</body>
</html>
